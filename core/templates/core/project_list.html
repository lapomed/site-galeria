{% extends 'core/base.html' %} {% block content %}
<div class="pt-24 pb-12 bg-[#0b0b0b]">
  <div class="container mx-auto px-4">
    <h1 class="text-3xl font-serif text-white mb-8 tracking-widest uppercase">
      Projetos
    </h1>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-1">
    {% for project in projects %}
    <a
      href="{% url 'project_detail' project.slug %}"
      class="relative group h-80 overflow-hidden block"
    >
      <div
        class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-110"
        style="background-image: url('{{ project.cover_image.url }}');"
      ></div>
      <div
        class="absolute inset-0 bg-linear-to-t from-black/90 via-black/20 to-transparent"
      ></div>
      <div class="absolute bottom-0 left-0 p-8 w-full">
        <span class="text-xs text-gray-400 uppercase tracking-widest mb-2 block"
          >{{ project.location }}</span
        >
        <h3 class="text-2xl font-serif text-white tracking-wide">
          {{ project.title }}
        </h3>
      </div>
    </a>
    {% empty %}
    <div class="col-span-full py-20 text-center">
      <p class="text-gray-500 font-serif">Nenhum projeto cadastrado.</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
