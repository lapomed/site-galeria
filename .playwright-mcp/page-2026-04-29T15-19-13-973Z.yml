      - generic [ref=e29]:
        - 'heading "PROJETO O PAMPA NEGRO: ARQUEOLOGIA DA ESCRAVIDÃO NA REGIÃO MERIDIONAL DO RIO GRANDE DO SUL (1780-1888)" [level=1] [ref=e30]'
        - paragraph [ref=e31]: REGIÃO MERIDIONAL DO RIO GRANDE DO SUL (1780-1888)
      - generic [ref=e33]:
        - heading "Sobre o Projeto" [level=2] [ref=e34]
        - generic [ref=e35]:
          - paragraph [ref=e36]:
            - strong [ref=e37]: "1. Projeto O Pampa Negro: Arqueologia da Escravidão"
          - text: O projeto
          - strong [ref=e38]: O Pampa Negro
          - text: dedica-se à investigação arqueológica sistemática da escravidão nas charqueadas da região meridional do Rio Grande do Sul, abrangendo o arco temporal de 1780 a 1888. A pesquisa emprega metodologias de ponta em análise espacial, utilizando fotogrametria por UAV (veículos aéreos não tripulados) para a geração de modelos 3D de alta resolução e mapeamento digital detalhado. O objetivo primordial é reconstruir o ambiente construído desses complexos agroindustriais para compreender as complexas relações de vigilância, as dinâmicas do trabalho forçado e as manifestações de resistência das populações escravizadas no pampa gaúcho.
          - paragraph
          - paragraph [ref=e39]:
            - strong [ref=e40]: 2. Investigação das paisagens arqueológicas das charqueadas
          - paragraph [ref=e41]:
            - text: Esta seção foca na análise das paisagens arqueológicas e culturais das charqueadas, examinando as deformações estruturais e os remanescentes arquitetônicos de senzalas, áreas de abate e pátios de secagem. A investigação busca identificar como a organização espacial foi deliberadamente projetada para a vigilância (surveillance) contínua dos trabalhadores. Através do cruzamento de dados arqueológicos e fontes históricas, o projeto analisa a agência dos escravizados na modificação desse espaço, buscando evidências de subversão da ordem imposta e a criação de espaços próprios de sociabilidade e resistência dentro do ambiente coercitivo da charqueada.
            - strong [ref=e42]: 3. Proveniência e análise da Coleção Batuque
            - text: O projeto contempla o estudo aprofundado da Coleção Batuque, atualmente depositada no Ethnological Museum of Berlin. Esta coleção é composta por 67 objetos sagrados de matriz africana, coletados por Pietzcker no início do século XX sob um contexto de repressão e confisco policial. A pesquisa de proveniência visa rastrear a trajetória desses itens desde o Rio Grande do Sul até a Alemanha, estabelecendo as bases para processos de repatriação digital e restituição simbólica. O estudo desses materiais é fundamental para a compreensão das práticas religiosas afro-brasileiras e sua persistência material frente à perseguição institucional.
            - img [ref=e43]
            - strong [ref=e44]: 4. Aquisição de dados de campo modernos
            - text: As etapas de aquisição de dados de campo ocorrem concentrando-se nos sítios arqueológicos das charqueadas de Pelotas e arredores. São utilizadas técnicas de fotogrametria aérea e terrestre para capturar a volumetria precisa das ruínas e do terreno. As campanhas são coordenadas pela UFPEL em cooperação com o LAPOMED-USP, garantindo a integração de dados georreferenciados em sistemas de informação geográfica (SIG). Os dados coletados servem de base para a criação de "gêmeos digitais" que permitirão análises arqueológicas não invasivas e a preservação virtual do patrimônio ameaçado pela degradação ambiental.
            - img [ref=e45]
            - strong [ref=e46]: 5. Equipe
            - text: Prof. Dr. Marcio Teixeira-Bastos, Departamento de Antropologia, Universidade de São Paulo (USP) Prof. Dr. Lucio Menezes Ferreira, Coordenador Geral, LEICMA/UFPEL Doutorando Leandro Infantini, Universidade Federal de Pelotas, UFPEL.
