services:
  web:
    build: .
    ports:
      - "4008:4008"
    volumes:
      - .:/app
      - /app/.venv
      - ./media:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-hlplb31p-t8d53
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    command: >
      bash -c "uv run python manage.py migrate --noinput &&
               uv run python manage.py collectstatic --noinput &&
               uv run python manage.py runserver 0.0.0.0:4008"
