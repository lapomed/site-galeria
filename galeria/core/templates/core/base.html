{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapomed | Laboratório de Arqueologia</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <header class="main-header">
      <div class="container header-content">
        <a href="{% url 'home' %}" class="logo">
          <span class="logo-icon">▲</span> LAPOMED
        </a>
        <nav class="main-nav">
          <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'project_list' %}">Projetos</a></li>
            <li><a href="#about">Quem Somos</a></li>
            <li><a href="#contact">Contato</a></li>
          </ul>
        </nav>
        <div class="header-actions">
          <a href="#donate" class="btn btn-outline">Apoiar</a>
        </div>
      </div>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="main-footer">
      <div class="container">
        <p>
          &copy; {% now "Y" %} LAPOMED - Laboratório de Preservação e Gestão de
          Acervos Arqueológicos.
        </p>
      </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
